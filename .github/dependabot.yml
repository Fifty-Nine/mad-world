version: 2

multi-ecosystem-groups:
  weekly-updates:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "uv"
    directory: "/"
    multi-ecosystem-group: "weekly-updates"
    groups:
      trivial:
        update-types: ["minor","patch"]
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    multi-ecosystem-group: "weekly-updates"
    groups:
      trivial:
        update-types: ["minor","patch"]
        patterns: ["*"]
